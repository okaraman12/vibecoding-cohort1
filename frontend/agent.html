<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Advisor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1d27;
      border-radius: 14px;
      border: 1px solid #2d3148;
      padding: 28px;
      width: 100%;
      max-width: 820px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #a78bfa;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      background: #312e81;
      color: #a78bfa;
      border-radius: 99px;
      padding: 3px 10px;
      letter-spacing: 0.04em;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    select, textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.9rem;
      color: #e2e8f0;
      transition: border-color 0.2s;
    }

    select:focus, textarea:focus {
      outline: none;
      border-color: #7c3aed;
    }

    textarea#system { height: 80px; resize: vertical; }

    #setup-section { display: flex; flex-direction: column; gap: 14px; }

    #baslatBtn {
      padding: 11px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #baslatBtn:hover { background: #6d28d9; }
    #baslatBtn:disabled { background: #3730a3; color: #818cf8; cursor: not-allowed; }

    /* Agent çalışma alanı */
    #agent-section { display: none; flex-direction: column; gap: 14px; }

    .session-info {
      font-size: 0.75rem;
      color: #64748b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #yeniBtn {
      font-size: 0.75rem;
      color: #a78bfa;
      background: none;
      border: 1px solid #4c1d95;
      border-radius: 6px;
      padding: 3px 10px;
      cursor: pointer;
    }
    #yeniBtn:hover { background: #1e1b4b; }

    /* Mesaj alanı */
    #messages {
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 16px;
      min-height: 360px;
      max-height: 560px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #0f1117;
    }

    .empty-hint {
      text-align: center;
      color: #475569;
      font-size: 0.85rem;
      margin: auto;
    }

    /* Kullanıcı mesajı */
    .msg-user {
      align-self: flex-end;
      background: #4c1d95;
      color: #e9d5ff;
      border-radius: 10px 10px 2px 10px;
      padding: 10px 14px;
      font-size: 0.88rem;
      line-height: 1.55;
      max-width: 80%;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Adım bloğu */
    .step-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .step-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #7c3aed;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .step-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #2d3148;
    }

    /* Thinking kutusu */
    .thinking-box {
      background: #1e1b4b22;
      border-left: 3px solid #4338ca;
      border-radius: 0 6px 6px 0;
      padding: 8px 12px;
      font-size: 0.83rem;
      color: #818cf8;
      font-style: italic;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    /* Tool call kutusu */
    .tool-call-box {
      background: #1c1400;
      border: 1px solid #854d0e;
      border-radius: 8px;
      overflow: hidden;
    }

    .tool-call-header {
      background: #1f1700;
      padding: 7px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #fbbf24;
    }

    .tool-icon { font-size: 0.9rem; }

    .tool-call-body {
      padding: 10px 12px;
    }

    .arg-row {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 0.8rem;
      line-height: 1.5;
    }

    .arg-key {
      color: #f59e0b;
      font-weight: 600;
      white-space: nowrap;
      min-width: 60px;
    }

    .arg-val {
      color: #d1d5db;
      font-family: "Menlo", "Consolas", monospace;
      white-space: pre-wrap;
      word-break: break-all;
      background: #0f1117;
      border-radius: 4px;
      padding: 2px 6px;
      flex: 1;
    }

    /* Tool result kutusu */
    .tool-result-box {
      background: #0a1a10;
      border: 1px solid #166534;
      border-radius: 8px;
      overflow: hidden;
    }

    .tool-result-header {
      background: #0c1e12;
      padding: 7px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #4ade80;
    }

    .tool-result-body {
      padding: 10px 12px;
      font-size: 0.8rem;
      font-family: "Menlo", "Consolas", monospace;
      color: #86efac;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
      line-height: 1.5;
    }

    /* Son yanıt (text) */
    .text-box {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.88rem;
      color: #e2e8f0;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Hata */
    .error-box {
      background: #1f0a0a;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.83rem;
      color: #fca5a5;
    }

    /* Input */
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #userPrompt {
      flex: 1;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.9rem;
      resize: none;
      height: 48px;
      max-height: 140px;
      overflow-y: auto;
    }

    #gonderBtn {
      padding: 0 20px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
      height: 48px;
    }
    #gonderBtn:hover { background: #6d28d9; }
    #gonderBtn:disabled { background: #3730a3; color: #818cf8; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(167,139,250,0.3);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Deploy Army deployment plan card ──────────── */
    .deploy-card {
      background: linear-gradient(180deg, #131725 0%, #0f1117 100%);
      border: 1px solid #2d3148;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }
    .deploy-header {
      padding: 14px 16px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .deploy-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .deploy-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .deploy-meta .chip {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 99px;
      background: #1e1b4b;
      color: #c4b5fd;
      border: 1px solid #312e81;
      letter-spacing: 0.04em;
    }
    .deploy-section {
      padding: 12px 16px;
      border-bottom: 1px solid #1f2330;
    }
    .deploy-section:last-child { border-bottom: none; }
    .deploy-section h4 {
      font-size: 0.7rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }
    .deploy-section p {
      font-size: 0.85rem;
      color: #cbd5e1;
      line-height: 1.55;
    }
    .deploy-row {
      display: grid;
      grid-template-columns: 150px 1fr 80px;
      gap: 12px;
      align-items: start;
      padding: 10px 0;
      border-bottom: 1px dashed #1f2330;
    }
    .deploy-row:last-child { border-bottom: none; }
    .role-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 9px;
      border-radius: 6px;
      background: #1e1b4b;
      color: #c4b5fd;
      border: 1px solid #4338ca;
      white-space: nowrap;
    }
    .role-badge.architect { background: #0c1828; color: #93c5fd; border-color: #1e40af; }
    .role-badge.engineer { background: #0c1e12; color: #86efac; border-color: #166534; }
    .role-badge.reviewer { background: #1c1400; color: #fcd34d; border-color: #854d0e; }
    .role-badge.security { background: #1f0a0a; color: #fca5a5; border-color: #7f1d1d; }
    .role-badge.qa { background: #0a1a1e; color: #67e8f9; border-color: #155e75; }
    .deploy-task-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 3px;
    }
    .deploy-task-desc {
      font-size: 0.78rem;
      color: #94a3b8;
      line-height: 1.5;
    }
    .deploy-task-deps {
      font-size: 0.68rem;
      color: #64748b;
      margin-top: 4px;
      font-family: "Menlo", monospace;
    }
    .complexity {
      font-size: 0.7rem;
      font-weight: 700;
      text-align: center;
      padding: 4px 0;
      border-radius: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .complexity.low { background: #0c1e12; color: #4ade80; border: 1px solid #166534; }
    .complexity.medium { background: #1c1400; color: #fbbf24; border: 1px solid #854d0e; }
    .complexity.high { background: #1f0a0a; color: #f87171; border: 1px solid #7f1d1d; }

    .exec-block {
      margin-top: 6px;
      background: #0a0d14;
      border: 1px solid #1f2330;
      border-radius: 6px;
      padding: 8px 10px;
      font-family: "Menlo", "Consolas", monospace;
      font-size: 0.72rem;
      color: #86efac;
      white-space: pre-wrap;
      max-height: 140px;
      overflow-y: auto;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 99px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Car Advisor</h1>
      <span class="badge">US MARKET · TOOL USE LOOP</span>
    </div>

    <!-- Kurulum -->
    <div id="setup-section">
      <div>
        <label for="model">Model</label>
        <select id="model">
          <optgroup label="Anthropic (Claude OAuth / API)">
            <option value="claude-sonnet-4-5">claude-sonnet-4-5</option>
            <option value="claude-opus-4-1">claude-opus-4-1</option>
            <option value="claude-haiku-4-5">claude-haiku-4-5</option>
            <option value="claude-3-5-sonnet-latest">claude-3-5-sonnet-latest</option>
            <option value="claude-3-5-haiku-latest">claude-3-5-haiku-latest</option>
          </optgroup>
          <optgroup label="OpenAI">
            <option value="gpt-4.1-mini">gpt-4.1-mini</option>
            <option value="gpt-4.1">gpt-4.1</option>
            <option value="gpt-4o">gpt-4o</option>
            <option value="gpt-4o-mini">gpt-4o-mini</option>
          </optgroup>
        </select>
      </div>
      <div>
        <label for="system">System Instructions</label>
        <textarea id="system">You are a professional US-market car-buying advisor. Use the pick_car, compare_specs, and estimate_ownership_cost tools to recommend vehicles based on the buyer's budget (in USD), use case, and preferences. Recommend cars and trims sold in the United States. Ground every recommendation in tool output. Respond in English. (Bonus: the deploy_army tool is retained for platform architecture demos.)</textarea>
      </div>
      <button id="baslatBtn" onclick="agentBaslat()">Start Advisor</button>
    </div>

    <!-- Agent çalışma alanı -->
    <div id="agent-section">
      <div class="session-info">
        <span id="sessionLabel"></span>
        <button id="yeniBtn" onclick="sifirla()">New Session</button>
      </div>

      <div id="messages">
        <span class="empty-hint">Advisor ready. Tell me your budget and what you need.</span>
      </div>

      <div class="input-row">
        <textarea id="userPrompt" placeholder="e.g. 'Budget $35k, family daily-driver SUV, AWD required, prefer Japanese brands.'" onkeydown="enterGonder(event)"></textarea>
        <button id="gonderBtn" onclick="gorevVer()">Ask</button>
      </div>
    </div>
  </div>

  <script>
    let sessionId = null;

    // ── Tool ikonları ──────────────────────────────────────
    const TOOL_ICONS = {
      terminal:   "⚡",
      dosya_oku:  "📖",
      dosya_yaz:  "✏️",
      deploy_army: "◆",
      pick_car:   "🚗",
      compare_specs: "⚖️",
      estimate_ownership_cost: "💰",
    };

    const CATEGORY_CLASS = {
      "Daily Driver":  "architect",
      "Family Hauler": "engineer",
      "Performance":   "security",
      "Off-road":      "reviewer",
      "EV / Hybrid":   "qa",
      "Luxury":        "architect",
      "Budget":        "engineer",
    };

    function renderCarPick(raw) {
      let data;
      try { data = JSON.parse(raw); } catch { return null; }
      if (!data || !Array.isArray(data.candidates)) return null;

      const card = document.createElement("div");
      card.className = "deploy-card";

      const hdr = document.createElement("div");
      hdr.className = "deploy-header";
      const title = document.createElement("div");
      title.className = "deploy-title";
      title.textContent = "Car Recommendations";
      const meta = document.createElement("div");
      meta.className = "deploy-meta";
      const p = data.profile || {};
      [
        p.budget && `Budget: ${p.budget}`,
        p.use_case && `Use: ${p.use_case}`,
        `${data.candidates.length} candidates`,
      ].filter(Boolean).forEach(t => {
        const c = document.createElement("span");
        c.className = "chip";
        c.textContent = t;
        meta.appendChild(c);
      });
      hdr.appendChild(title);
      hdr.appendChild(meta);
      card.appendChild(hdr);

      if (data.summary) {
        const s = document.createElement("div");
        s.className = "deploy-section";
        s.innerHTML = `<h4>Buyer Profile</h4><p></p>`;
        s.querySelector("p").textContent = data.summary;
        card.appendChild(s);
      }
      if (data.tradeoffs) {
        const s = document.createElement("div");
        s.className = "deploy-section";
        s.innerHTML = `<h4>Tradeoffs & Notes</h4><p></p>`;
        s.querySelector("p").textContent = data.tradeoffs;
        card.appendChild(s);
      }

      const sec = document.createElement("div");
      sec.className = "deploy-section";
      const h = document.createElement("h4");
      h.textContent = "Candidate Vehicles";
      sec.appendChild(h);

      data.candidates.forEach(c => {
        const row = document.createElement("div");
        row.className = "deploy-row";

        const badge = document.createElement("span");
        badge.className = `role-badge ${CATEGORY_CLASS[c.category] || ""}`;
        badge.textContent = c.category;
        row.appendChild(badge);

        const mid = document.createElement("div");
        const t = document.createElement("div");
        t.className = "deploy-task-title";
        t.textContent = `#${c.rank} · ${c.make} ${c.model}  ·  ${c.price_estimate}`;
        const d = document.createElement("div");
        d.className = "deploy-task-desc";
        d.textContent = c.why;
        mid.appendChild(t);
        mid.appendChild(d);

        const lists = document.createElement("div");
        lists.style.cssText = "display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;";
        const mk = (label, items, color) => {
          const wrap = document.createElement("div");
          wrap.innerHTML = `<div style="font-size:0.68rem;font-weight:700;letter-spacing:0.06em;color:${color};text-transform:uppercase;margin-bottom:3px;">${label}</div>`;
          items.forEach(it => {
            const li = document.createElement("div");
            li.style.cssText = "font-size:0.75rem;color:#cbd5e1;line-height:1.45;padding-left:10px;position:relative;";
            li.innerHTML = `<span style="position:absolute;left:0;color:${color};">·</span>`;
            li.appendChild(document.createTextNode(" " + it));
            wrap.appendChild(li);
          });
          return wrap;
        };
        lists.appendChild(mk("Pros", c.pros || [], "#4ade80"));
        lists.appendChild(mk("Cons", c.cons || [], "#f87171"));
        mid.appendChild(lists);
        row.appendChild(mid);

        const fit = document.createElement("div");
        const fitClass = c.fit === "Strong" ? "low" : c.fit === "Stretch" ? "high" : "medium";
        fit.className = `complexity ${fitClass}`;
        fit.textContent = c.fit;
        row.appendChild(fit);

        sec.appendChild(row);
      });
      card.appendChild(sec);
      return card;
    }

    function renderCompareSpecs(raw) {
      let data;
      try { data = JSON.parse(raw); } catch { return null; }
      if (!data || !Array.isArray(data.rows)) return null;

      const card = document.createElement("div");
      card.className = "deploy-card";

      const hdr = document.createElement("div");
      hdr.className = "deploy-header";
      hdr.innerHTML = `<div class="deploy-title">Side-by-Side Comparison</div>`;
      const meta = document.createElement("div");
      meta.className = "deploy-meta";
      [data.model_a, "vs", data.model_b].forEach(t => {
        const c = document.createElement("span");
        c.className = "chip";
        c.textContent = t;
        meta.appendChild(c);
      });
      hdr.appendChild(meta);
      card.appendChild(hdr);

      if (data.verdict) {
        const s = document.createElement("div");
        s.className = "deploy-section";
        s.innerHTML = `<h4>Verdict</h4><p></p>`;
        s.querySelector("p").textContent = data.verdict;
        card.appendChild(s);
      }

      const sec = document.createElement("div");
      sec.className = "deploy-section";
      const table = document.createElement("div");
      table.style.cssText = "display:grid;grid-template-columns:140px 1fr 1fr;gap:6px 10px;font-size:0.8rem;";
      const head = (txt, color) => {
        const d = document.createElement("div");
        d.textContent = txt;
        d.style.cssText = `font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:${color || "#64748b"};padding-bottom:6px;border-bottom:1px solid #2d3148;`;
        return d;
      };
      table.appendChild(head("Spec"));
      table.appendChild(head(data.model_a, "#a78bfa"));
      table.appendChild(head(data.model_b, "#a78bfa"));

      data.rows.forEach(r => {
        const s = document.createElement("div");
        s.textContent = r.spec;
        s.style.cssText = "color:#94a3b8;padding:6px 0;border-bottom:1px dashed #1f2330;";
        table.appendChild(s);
        const cell = (txt, win) => {
          const d = document.createElement("div");
          d.textContent = txt;
          const winColor = win ? "color:#4ade80;font-weight:600;" : "color:#e2e8f0;";
          d.style.cssText = `padding:6px 0;border-bottom:1px dashed #1f2330;${winColor}`;
          return d;
        };
        table.appendChild(cell(r.a, r.winner === "a"));
        table.appendChild(cell(r.b, r.winner === "b"));
      });
      sec.appendChild(table);
      card.appendChild(sec);
      return card;
    }

    function renderOwnershipCost(raw) {
      let data;
      try { data = JSON.parse(raw); } catch { return null; }
      if (!data || !Array.isArray(data.components)) return null;

      const fmt = n => "$" + Math.round(n).toLocaleString();

      const card = document.createElement("div");
      card.className = "deploy-card";

      const hdr = document.createElement("div");
      hdr.className = "deploy-header";
      hdr.innerHTML = `<div class="deploy-title">${data.horizon_years}-Year Total Cost of Ownership</div>`;
      const meta = document.createElement("div");
      meta.className = "deploy-meta";
      [
        data.model,
        `${data.category}`,
        `${data.annual_mileage.toLocaleString()} mi/yr`,
      ].forEach(t => {
        const c = document.createElement("span");
        c.className = "chip";
        c.textContent = t;
        meta.appendChild(c);
      });
      hdr.appendChild(meta);
      card.appendChild(hdr);

      const sec = document.createElement("div");
      sec.className = "deploy-section";
      data.components.forEach(comp => {
        const row = document.createElement("div");
        row.style.cssText = "display:grid;grid-template-columns:130px 1fr 110px;gap:10px;align-items:center;padding:8px 0;border-bottom:1px dashed #1f2330;";
        const lbl = document.createElement("div");
        lbl.textContent = comp.label;
        lbl.style.cssText = "font-size:0.82rem;color:#cbd5e1;font-weight:600;";
        const note = document.createElement("div");
        note.textContent = comp.note;
        note.style.cssText = "font-size:0.72rem;color:#64748b;";
        const amt = document.createElement("div");
        amt.textContent = fmt(comp.amount);
        amt.style.cssText = "font-family:Menlo,monospace;font-size:0.85rem;color:#fbbf24;text-align:right;";
        row.appendChild(lbl);
        row.appendChild(note);
        row.appendChild(amt);
        sec.appendChild(row);
      });

      const total = document.createElement("div");
      total.style.cssText = "display:flex;justify-content:space-between;align-items:center;padding:12px 0 4px;margin-top:6px;border-top:2px solid #2d3148;";
      total.innerHTML = `<span style="font-weight:700;color:#a78bfa;letter-spacing:0.05em;text-transform:uppercase;font-size:0.78rem;">Total</span>
                         <span style="font-family:Menlo,monospace;font-size:1.05rem;color:#4ade80;font-weight:700;">${fmt(data.total)}</span>`;
      sec.appendChild(total);

      const cpm = document.createElement("div");
      cpm.style.cssText = "font-size:0.72rem;color:#64748b;text-align:right;margin-top:4px;";
      cpm.textContent = `~$${data.cost_per_mile.toFixed(3)}/mi  ·  ${data.disclaimer}`;
      sec.appendChild(cpm);

      card.appendChild(sec);
      return card;
    }

    const CUSTOM_RENDERERS = {
      deploy_army: renderDeployPlan,
      pick_car: renderCarPick,
      compare_specs: renderCompareSpecs,
      estimate_ownership_cost: renderOwnershipCost,
    };

    const ROLE_CLASS = {
      "Lead Architect":  "architect",
      "Senior Engineer": "engineer",
      "Code Reviewer":   "reviewer",
      "Security Analyst":"security",
      "QA Specialist":   "qa",
    };

    function renderDeployPlan(raw) {
      let plan;
      try { plan = JSON.parse(raw); } catch { return null; }
      if (!plan || !Array.isArray(plan.subtasks)) return null;

      const card = document.createElement("div");
      card.className = "deploy-card";

      // Header
      const hdr = document.createElement("div");
      hdr.className = "deploy-header";
      const title = document.createElement("div");
      title.className = "deploy-title";
      title.textContent = "Deployment Plan";
      const meta = document.createElement("div");
      meta.className = "deploy-meta";
      const chips = [
        `Task ${plan.task_id || "—"}`,
        `Mode: ${plan.execution_mode || "simulation"}`,
        `${plan.subtasks.length} subtasks`,
      ];
      if (plan.execute) chips.push("Executed");
      chips.forEach(t => {
        const c = document.createElement("span");
        c.className = "chip";
        c.textContent = t;
        meta.appendChild(c);
      });
      hdr.appendChild(title);
      hdr.appendChild(meta);
      card.appendChild(hdr);

      // Mission summary
      if (plan.mission_summary) {
        const s = document.createElement("div");
        s.className = "deploy-section";
        s.innerHTML = `<h4>Mission Summary</h4><p></p>`;
        s.querySelector("p").textContent = plan.mission_summary;
        card.appendChild(s);
      }

      // Risk assessment
      if (plan.risk_assessment) {
        const s = document.createElement("div");
        s.className = "deploy-section";
        s.innerHTML = `<h4>Risk Assessment</h4><p></p>`;
        s.querySelector("p").textContent = plan.risk_assessment;
        card.appendChild(s);
      }

      // Subtasks
      const sub = document.createElement("div");
      sub.className = "deploy-section";
      const subH = document.createElement("h4");
      subH.textContent = "Role Assignments";
      sub.appendChild(subH);

      const results = (plan.execution_results || []).reduce((m, r) => {
        m[r.subtask_id] = r; return m;
      }, {});

      plan.subtasks.forEach(st => {
        const row = document.createElement("div");
        row.className = "deploy-row";

        const badge = document.createElement("span");
        badge.className = `role-badge ${ROLE_CLASS[st.role] || ""}`;
        badge.textContent = st.role;
        row.appendChild(badge);

        const mid = document.createElement("div");
        const t = document.createElement("div");
        t.className = "deploy-task-title";
        t.textContent = `${st.id} · ${st.title}`;
        const d = document.createElement("div");
        d.className = "deploy-task-desc";
        d.textContent = st.description;
        mid.appendChild(t);
        mid.appendChild(d);
        if (st.depends_on && st.depends_on.length) {
          const dep = document.createElement("div");
          dep.className = "deploy-task-deps";
          dep.textContent = `depends on: ${st.depends_on.join(", ")}`;
          mid.appendChild(dep);
        }
        const r = results[st.id];
        if (r) {
          const ex = document.createElement("div");
          ex.className = "exec-block";
          ex.textContent = `[${r.status} · ${r.mode} · ${r.duration_seconds}s]\n${r.output}`;
          mid.appendChild(ex);
        }
        row.appendChild(mid);

        const cx = document.createElement("div");
        const cKey = (st.complexity || "Medium").toLowerCase();
        cx.className = `complexity ${cKey}`;
        cx.textContent = st.complexity || "Medium";
        row.appendChild(cx);

        sub.appendChild(row);
      });
      card.appendChild(sub);

      return card;
    }

    // ── Başlat ─────────────────────────────────────────────
    async function agentBaslat() {
      const model = document.getElementById("model").value;
      const system_instructions = document.getElementById("system").value.trim();
      const btn = document.getElementById("baslatBtn");

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Starting...';

      try {
        const res = await fetch("/api/agent/yeni", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model, system_instructions }),
        });
        if (!res.ok) throw new Error(`Sunucu hatası: ${res.status}`);

        const data = await res.json();
        sessionId = data.session_id;

        document.getElementById("setup-section").style.display = "none";
        const sec = document.getElementById("agent-section");
        sec.style.display = "flex";
        document.getElementById("sessionLabel").textContent =
          `Model: ${model}  ·  Session: ${sessionId.slice(0, 8)}…`;
        document.getElementById("userPrompt").focus();
      } catch (err) {
        alert("Agent başlatılamadı: " + err.message);
        btn.disabled = false;
        btn.textContent = "Start Advisor";
      }
    }

    function enterGonder(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        gorevVer();
      }
    }

    // ── Görev gönder ───────────────────────────────────────
    async function gorevVer() {
      const promptEl = document.getElementById("userPrompt");
      const user_prompt = promptEl.value.trim();
      if (!user_prompt) return;

      const btn = document.getElementById("gonderBtn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      promptEl.value = "";
      promptEl.style.height = "48px";

      temizleHint();
      ekleKullanici(user_prompt);

      // Aktif adım bloğu
      let stepBlock = null;
      let stepCount = 0;

      try {
        const res = await fetch("/api/agent/calistir", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, user_prompt }),
        });
        if (!res.ok) throw new Error(`Sunucu hatası: ${res.status}`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();
          for (const line of lines) {
            if (line.trim()) handleEvent(JSON.parse(line));
          }
        }
        if (buffer.trim()) handleEvent(JSON.parse(buffer));

      } catch (err) {
        ekleHata(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Ask";
        promptEl.focus();
      }

      // ── Event handler ────────────────────────────────────
      function handleEvent(ev) {
        switch (ev.type) {

          case "step_start": {
            stepCount++;
            stepBlock = document.createElement("div");
            stepBlock.className = "step-block";

            const lbl = document.createElement("div");
            lbl.className = "step-label";
            lbl.textContent = `Step ${stepCount}`;
            stepBlock.appendChild(lbl);

            getMsgs().appendChild(stepBlock);
            scroll();
            break;
          }

          case "thinking": {
            const box = document.createElement("div");
            box.className = "thinking-box";
            box.textContent = ev.content;
            (stepBlock || getMsgs()).appendChild(box);
            scroll();
            break;
          }

          case "tool_call": {
            const wrap = document.createElement("div");
            wrap.className = "tool-call-box";

            const icon = TOOL_ICONS[ev.name] || "🔧";
            const hdr = document.createElement("div");
            hdr.className = "tool-call-header";
            hdr.innerHTML = `<span class="tool-icon">${icon}</span> ${ev.name}`;
            wrap.appendChild(hdr);

            const body = document.createElement("div");
            body.className = "tool-call-body";

            for (const [k, v] of Object.entries(ev.args)) {
              const row = document.createElement("div");
              row.className = "arg-row";
              row.innerHTML = `<span class="arg-key">${escHtml(k)}</span>
                               <span class="arg-val">${escHtml(String(v))}</span>`;
              body.appendChild(row);
            }

            wrap.appendChild(body);
            (stepBlock || getMsgs()).appendChild(wrap);
            scroll();
            break;
          }

          case "tool_result": {
            const renderer = CUSTOM_RENDERERS[ev.name];
            if (renderer) {
              const card = renderer(ev.result);
              if (card) { (stepBlock || getMsgs()).appendChild(card); scroll(); break; }
            }
            const wrap = document.createElement("div");
            wrap.className = "tool-result-box";

            const icon = TOOL_ICONS[ev.name] || "🔧";
            const hdr = document.createElement("div");
            hdr.className = "tool-result-header";
            hdr.innerHTML = `<span>✓</span> ${icon} ${ev.name} result`;
            wrap.appendChild(hdr);

            const body = document.createElement("div");
            body.className = "tool-result-body";
            body.textContent = ev.result;
            wrap.appendChild(body);

            (stepBlock || getMsgs()).appendChild(wrap);
            scroll();
            break;
          }

          case "text": {
            const box = document.createElement("div");
            box.className = "text-box";
            box.textContent = ev.content;
            (stepBlock || getMsgs()).appendChild(box);
            scroll();
            break;
          }

          case "error": {
            ekleHata(ev.message);
            break;
          }

          case "done":
            break;
        }
      }
    }

    // ── Yardımcılar ────────────────────────────────────────
    function getMsgs() {
      return document.getElementById("messages");
    }

    function temizleHint() {
      const hint = getMsgs().querySelector(".empty-hint");
      if (hint) hint.remove();
    }

    function ekleKullanici(metin) {
      const div = document.createElement("div");
      div.className = "msg-user";
      div.textContent = metin;
      getMsgs().appendChild(div);
      scroll();
    }

    function ekleHata(mesaj) {
      const div = document.createElement("div");
      div.className = "error-box";
      div.textContent = "Error: " + mesaj;
      getMsgs().appendChild(div);
      scroll();
    }

    function scroll() {
      const m = getMsgs();
      m.scrollTop = m.scrollHeight;
    }

    function escHtml(s) {
      return s
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function sifirla() {
      sessionId = null;
      getMsgs().innerHTML = '<span class="empty-hint">Advisor ready. Tell me your budget and what you need.</span>';
      document.getElementById("agent-section").style.display = "none";
      const setup = document.getElementById("setup-section");
      setup.style.display = "flex";
      const btn = document.getElementById("baslatBtn");
      btn.disabled = false;
      btn.textContent = "Agenti Başlat";
    }
  </script>
</body>
