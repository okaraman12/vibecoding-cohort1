<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kodlama Agenti</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1d27;
      border-radius: 14px;
      border: 1px solid #2d3148;
      padding: 28px;
      width: 100%;
      max-width: 820px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #a78bfa;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      background: #312e81;
      color: #a78bfa;
      border-radius: 99px;
      padding: 3px 10px;
      letter-spacing: 0.04em;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    select, textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.9rem;
      color: #e2e8f0;
      transition: border-color 0.2s;
    }

    select:focus, textarea:focus {
      outline: none;
      border-color: #7c3aed;
    }

    textarea#system { height: 80px; resize: vertical; }

    #setup-section { display: flex; flex-direction: column; gap: 14px; }

    #baslatBtn {
      padding: 11px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #baslatBtn:hover { background: #6d28d9; }
    #baslatBtn:disabled { background: #3730a3; color: #818cf8; cursor: not-allowed; }

    /* Agent çalışma alanı */
    #agent-section { display: none; flex-direction: column; gap: 14px; }

    .session-info {
      font-size: 0.75rem;
      color: #64748b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #yeniBtn {
      font-size: 0.75rem;
      color: #a78bfa;
      background: none;
      border: 1px solid #4c1d95;
      border-radius: 6px;
      padding: 3px 10px;
      cursor: pointer;
    }
    #yeniBtn:hover { background: #1e1b4b; }

    /* Mesaj alanı */
    #messages {
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 16px;
      min-height: 360px;
      max-height: 560px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #0f1117;
    }

    .empty-hint {
      text-align: center;
      color: #475569;
      font-size: 0.85rem;
      margin: auto;
    }

    /* Kullanıcı mesajı */
    .msg-user {
      align-self: flex-end;
      background: #4c1d95;
      color: #e9d5ff;
      border-radius: 10px 10px 2px 10px;
      padding: 10px 14px;
      font-size: 0.88rem;
      line-height: 1.55;
      max-width: 80%;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Adım bloğu */
    .step-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .step-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #7c3aed;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .step-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #2d3148;
    }

    /* Thinking kutusu */
    .thinking-box {
      background: #1e1b4b22;
      border-left: 3px solid #4338ca;
      border-radius: 0 6px 6px 0;
      padding: 8px 12px;
      font-size: 0.83rem;
      color: #818cf8;
      font-style: italic;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    /* Tool call kutusu */
    .tool-call-box {
      background: #1c1400;
      border: 1px solid #854d0e;
      border-radius: 8px;
      overflow: hidden;
    }

    .tool-call-header {
      background: #1f1700;
      padding: 7px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #fbbf24;
    }

    .tool-icon { font-size: 0.9rem; }

    .tool-call-body {
      padding: 10px 12px;
    }

    .arg-row {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 0.8rem;
      line-height: 1.5;
    }

    .arg-key {
      color: #f59e0b;
      font-weight: 600;
      white-space: nowrap;
      min-width: 60px;
    }

    .arg-val {
      color: #d1d5db;
      font-family: "Menlo", "Consolas", monospace;
      white-space: pre-wrap;
      word-break: break-all;
      background: #0f1117;
      border-radius: 4px;
      padding: 2px 6px;
      flex: 1;
    }

    /* Tool result kutusu */
    .tool-result-box {
      background: #0a1a10;
      border: 1px solid #166534;
      border-radius: 8px;
      overflow: hidden;
    }

    .tool-result-header {
      background: #0c1e12;
      padding: 7px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #4ade80;
    }

    .tool-result-body {
      padding: 10px 12px;
      font-size: 0.8rem;
      font-family: "Menlo", "Consolas", monospace;
      color: #86efac;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
      line-height: 1.5;
    }

    /* Son yanıt (text) */
    .text-box {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.88rem;
      color: #e2e8f0;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Hata */
    .error-box {
      background: #1f0a0a;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.83rem;
      color: #fca5a5;
    }

    /* Input */
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #userPrompt {
      flex: 1;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.9rem;
      resize: none;
      height: 48px;
      max-height: 140px;
      overflow-y: auto;
    }

    #gonderBtn {
      padding: 0 20px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
      height: 48px;
    }
    #gonderBtn:hover { background: #6d28d9; }
    #gonderBtn:disabled { background: #3730a3; color: #818cf8; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(167,139,250,0.3);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Deploy Army deployment plan card ──────────── */
    .deploy-card {
      background: linear-gradient(180deg, #131725 0%, #0f1117 100%);
      border: 1px solid #2d3148;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }
    .deploy-header {
      padding: 14px 16px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .deploy-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .deploy-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .deploy-meta .chip {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 99px;
      background: #1e1b4b;
      color: #c4b5fd;
      border: 1px solid #312e81;
      letter-spacing: 0.04em;
    }
    .deploy-section {
      padding: 12px 16px;
      border-bottom: 1px solid #1f2330;
    }
    .deploy-section:last-child { border-bottom: none; }
    .deploy-section h4 {
      font-size: 0.7rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }
    .deploy-section p {
      font-size: 0.85rem;
      color: #cbd5e1;
      line-height: 1.55;
    }
    .deploy-row {
      display: grid;
      grid-template-columns: 150px 1fr 80px;
      gap: 12px;
      align-items: start;
      padding: 10px 0;
      border-bottom: 1px dashed #1f2330;
    }
    .deploy-row:last-child { border-bottom: none; }
    .role-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 9px;
      border-radius: 6px;
      background: #1e1b4b;
      color: #c4b5fd;
      border: 1px solid #4338ca;
      white-space: nowrap;
    }
    .role-badge.architect { background: #0c1828; color: #93c5fd; border-color: #1e40af; }
    .role-badge.engineer { background: #0c1e12; color: #86efac; border-color: #166534; }
    .role-badge.reviewer { background: #1c1400; color: #fcd34d; border-color: #854d0e; }
    .role-badge.security { background: #1f0a0a; color: #fca5a5; border-color: #7f1d1d; }
    .role-badge.qa { background: #0a1a1e; color: #67e8f9; border-color: #155e75; }
    .deploy-task-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 3px;
    }
    .deploy-task-desc {
      font-size: 0.78rem;
      color: #94a3b8;
      line-height: 1.5;
    }
    .deploy-task-deps {
      font-size: 0.68rem;
      color: #64748b;
      margin-top: 4px;
      font-family: "Menlo", monospace;
    }
    .complexity {
      font-size: 0.7rem;
      font-weight: 700;
      text-align: center;
      padding: 4px 0;
      border-radius: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .complexity.low { background: #0c1e12; color: #4ade80; border: 1px solid #166534; }
    .complexity.medium { background: #1c1400; color: #fbbf24; border: 1px solid #854d0e; }
    .complexity.high { background: #1f0a0a; color: #f87171; border: 1px solid #7f1d1d; }

    .exec-block {
      margin-top: 6px;
      background: #0a0d14;
      border: 1px solid #1f2330;
      border-radius: 6px;
      padding: 8px 10px;
      font-family: "Menlo", "Consolas", monospace;
      font-size: 0.72rem;
      color: #86efac;
      white-space: pre-wrap;
      max-height: 140px;
      overflow-y: auto;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 99px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Kodlama Agenti</h1>
      <span class="badge">TOOL USE LOOP</span>
    </div>

    <!-- Kurulum -->
    <div id="setup-section">
      <div>
        <label for="model">Model</label>
        <select id="model">
          <optgroup label="Anthropic (Claude OAuth / API)">
            <option value="claude-sonnet-4-5">claude-sonnet-4-5</option>
            <option value="claude-opus-4-1">claude-opus-4-1</option>
            <option value="claude-haiku-4-5">claude-haiku-4-5</option>
            <option value="claude-3-5-sonnet-latest">claude-3-5-sonnet-latest</option>
            <option value="claude-3-5-haiku-latest">claude-3-5-haiku-latest</option>
          </optgroup>
          <optgroup label="OpenAI">
            <option value="gpt-4.1-mini">gpt-4.1-mini</option>
            <option value="gpt-4.1">gpt-4.1</option>
            <option value="gpt-4o">gpt-4o</option>
            <option value="gpt-4o-mini">gpt-4o-mini</option>
          </optgroup>
        </select>
      </div>
      <div>
        <label for="system">System Instructions</label>
        <textarea id="system">Sen bir kodlama agentisin. Görevleri tamamlamak için terminal, dosya okuma ve dosya yazma araçlarını kullan. Türkçe yanıt ver.</textarea>
      </div>
      <button id="baslatBtn" onclick="agentBaslat()">Agenti Başlat</button>
    </div>

    <!-- Agent çalışma alanı -->
    <div id="agent-section">
      <div class="session-info">
        <span id="sessionLabel"></span>
        <button id="yeniBtn" onclick="sifirla()">Yeni Oturum</button>
      </div>

      <div id="messages">
        <span class="empty-hint">Agent hazır. Bir görev verin.</span>
      </div>

      <div class="input-row">
        <textarea id="userPrompt" placeholder="Görevi yazın... (Shift+Enter yeni satır)" onkeydown="enterGonder(event)"></textarea>
        <button id="gonderBtn" onclick="gorevVer()">Çalıştır</button>
      </div>
    </div>
  </div>

  <script>
    let sessionId = null;

    // ── Tool ikonları ──────────────────────────────────────
    const TOOL_ICONS = {
      terminal:   "⚡",
      dosya_oku:  "📖",
      dosya_yaz:  "✏️",
      deploy_army: "◆",
    };

    const ROLE_CLASS = {
      "Lead Architect":  "architect",
      "Senior Engineer": "engineer",
      "Code Reviewer":   "reviewer",
      "Security Analyst":"security",
      "QA Specialist":   "qa",
    };

    function renderDeployPlan(raw) {
      let plan;
      try { plan = JSON.parse(raw); } catch { return null; }
      if (!plan || !Array.isArray(plan.subtasks)) return null;

      const card = document.createElement("div");
      card.className = "deploy-card";

      // Header
      const hdr = document.createElement("div");
      hdr.className = "deploy-header";
      const title = document.createElement("div");
      title.className = "deploy-title";
      title.textContent = "Deployment Plan";
      const meta = document.createElement("div");
      meta.className = "deploy-meta";
      const chips = [
        `Task ${plan.task_id || "—"}`,
        `Mode: ${plan.execution_mode || "simulation"}`,
        `${plan.subtasks.length} subtasks`,
      ];
      if (plan.execute) chips.push("Executed");
      chips.forEach(t => {
        const c = document.createElement("span");
        c.className = "chip";
        c.textContent = t;
        meta.appendChild(c);
      });
      hdr.appendChild(title);
      hdr.appendChild(meta);
      card.appendChild(hdr);

      // Mission summary
      if (plan.mission_summary) {
        const s = document.createElement("div");
        s.className = "deploy-section";
        s.innerHTML = `<h4>Mission Summary</h4><p></p>`;
        s.querySelector("p").textContent = plan.mission_summary;
        card.appendChild(s);
      }

      // Risk assessment
      if (plan.risk_assessment) {
        const s = document.createElement("div");
        s.className = "deploy-section";
        s.innerHTML = `<h4>Risk Assessment</h4><p></p>`;
        s.querySelector("p").textContent = plan.risk_assessment;
        card.appendChild(s);
      }

      // Subtasks
      const sub = document.createElement("div");
      sub.className = "deploy-section";
      const subH = document.createElement("h4");
      subH.textContent = "Role Assignments";
      sub.appendChild(subH);

      const results = (plan.execution_results || []).reduce((m, r) => {
        m[r.subtask_id] = r; return m;
      }, {});

      plan.subtasks.forEach(st => {
        const row = document.createElement("div");
        row.className = "deploy-row";

        const badge = document.createElement("span");
        badge.className = `role-badge ${ROLE_CLASS[st.role] || ""}`;
        badge.textContent = st.role;
        row.appendChild(badge);

        const mid = document.createElement("div");
        const t = document.createElement("div");
        t.className = "deploy-task-title";
        t.textContent = `${st.id} · ${st.title}`;
        const d = document.createElement("div");
        d.className = "deploy-task-desc";
        d.textContent = st.description;
        mid.appendChild(t);
        mid.appendChild(d);
        if (st.depends_on && st.depends_on.length) {
          const dep = document.createElement("div");
          dep.className = "deploy-task-deps";
          dep.textContent = `depends on: ${st.depends_on.join(", ")}`;
          mid.appendChild(dep);
        }
        const r = results[st.id];
        if (r) {
          const ex = document.createElement("div");
          ex.className = "exec-block";
          ex.textContent = `[${r.status} · ${r.mode} · ${r.duration_seconds}s]\n${r.output}`;
          mid.appendChild(ex);
        }
        row.appendChild(mid);

        const cx = document.createElement("div");
        const cKey = (st.complexity || "Medium").toLowerCase();
        cx.className = `complexity ${cKey}`;
        cx.textContent = st.complexity || "Medium";
        row.appendChild(cx);

        sub.appendChild(row);
      });
      card.appendChild(sub);

      return card;
    }

    // ── Başlat ─────────────────────────────────────────────
    async function agentBaslat() {
      const model = document.getElementById("model").value;
      const system_instructions = document.getElementById("system").value.trim();
      const btn = document.getElementById("baslatBtn");

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Başlatılıyor...';

      try {
        const res = await fetch("/api/agent/yeni", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model, system_instructions }),
        });
        if (!res.ok) throw new Error(`Sunucu hatası: ${res.status}`);

        const data = await res.json();
        sessionId = data.session_id;

        document.getElementById("setup-section").style.display = "none";
        const sec = document.getElementById("agent-section");
        sec.style.display = "flex";
        document.getElementById("sessionLabel").textContent =
          `Model: ${model}  ·  Session: ${sessionId.slice(0, 8)}…`;
        document.getElementById("userPrompt").focus();
      } catch (err) {
        alert("Agent başlatılamadı: " + err.message);
        btn.disabled = false;
        btn.textContent = "Agenti Başlat";
      }
    }

    function enterGonder(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        gorevVer();
      }
    }

    // ── Görev gönder ───────────────────────────────────────
    async function gorevVer() {
      const promptEl = document.getElementById("userPrompt");
      const user_prompt = promptEl.value.trim();
      if (!user_prompt) return;

      const btn = document.getElementById("gonderBtn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      promptEl.value = "";
      promptEl.style.height = "48px";

      temizleHint();
      ekleKullanici(user_prompt);

      // Aktif adım bloğu
      let stepBlock = null;
      let stepCount = 0;

      try {
        const res = await fetch("/api/agent/calistir", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, user_prompt }),
        });
        if (!res.ok) throw new Error(`Sunucu hatası: ${res.status}`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();
          for (const line of lines) {
            if (line.trim()) handleEvent(JSON.parse(line));
          }
        }
        if (buffer.trim()) handleEvent(JSON.parse(buffer));

      } catch (err) {
        ekleHata(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Çalıştır";
        promptEl.focus();
      }

      // ── Event handler ────────────────────────────────────
      function handleEvent(ev) {
        switch (ev.type) {

          case "step_start": {
            stepCount++;
            stepBlock = document.createElement("div");
            stepBlock.className = "step-block";

            const lbl = document.createElement("div");
            lbl.className = "step-label";
            lbl.textContent = `Adım ${stepCount}`;
            stepBlock.appendChild(lbl);

            getMsgs().appendChild(stepBlock);
            scroll();
            break;
          }

          case "thinking": {
            const box = document.createElement("div");
            box.className = "thinking-box";
            box.textContent = ev.content;
            (stepBlock || getMsgs()).appendChild(box);
            scroll();
            break;
          }

          case "tool_call": {
            const wrap = document.createElement("div");
            wrap.className = "tool-call-box";

            const icon = TOOL_ICONS[ev.name] || "🔧";
            const hdr = document.createElement("div");
            hdr.className = "tool-call-header";
            hdr.innerHTML = `<span class="tool-icon">${icon}</span> ${ev.name}`;
            wrap.appendChild(hdr);

            const body = document.createElement("div");
            body.className = "tool-call-body";

            for (const [k, v] of Object.entries(ev.args)) {
              const row = document.createElement("div");
              row.className = "arg-row";
              row.innerHTML = `<span class="arg-key">${escHtml(k)}</span>
                               <span class="arg-val">${escHtml(String(v))}</span>`;
              body.appendChild(row);
            }

            wrap.appendChild(body);
            (stepBlock || getMsgs()).appendChild(wrap);
            scroll();
            break;
          }

          case "tool_result": {
            if (ev.name === "deploy_army") {
              const card = renderDeployPlan(ev.result);
              if (card) { (stepBlock || getMsgs()).appendChild(card); scroll(); break; }
            }
            const wrap = document.createElement("div");
            wrap.className = "tool-result-box";

            const icon = TOOL_ICONS[ev.name] || "🔧";
            const hdr = document.createElement("div");
            hdr.className = "tool-result-header";
            hdr.innerHTML = `<span>✓</span> ${icon} ${ev.name} sonucu`;
            wrap.appendChild(hdr);

            const body = document.createElement("div");
            body.className = "tool-result-body";
            body.textContent = ev.result;
            wrap.appendChild(body);

            (stepBlock || getMsgs()).appendChild(wrap);
            scroll();
            break;
          }

          case "text": {
            const box = document.createElement("div");
            box.className = "text-box";
            box.textContent = ev.content;
            (stepBlock || getMsgs()).appendChild(box);
            scroll();
            break;
          }

          case "error": {
            ekleHata(ev.message);
            break;
          }

          case "done":
            break;
        }
      }
    }

    // ── Yardımcılar ────────────────────────────────────────
    function getMsgs() {
      return document.getElementById("messages");
    }

    function temizleHint() {
      const hint = getMsgs().querySelector(".empty-hint");
      if (hint) hint.remove();
    }

    function ekleKullanici(metin) {
      const div = document.createElement("div");
      div.className = "msg-user";
      div.textContent = metin;
      getMsgs().appendChild(div);
      scroll();
    }

    function ekleHata(mesaj) {
      const div = document.createElement("div");
      div.className = "error-box";
      div.textContent = "Hata: " + mesaj;
      getMsgs().appendChild(div);
      scroll();
    }

    function scroll() {
      const m = getMsgs();
      m.scrollTop = m.scrollHeight;
    }

    function escHtml(s) {
      return s
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function sifirla() {
      sessionId = null;
      getMsgs().innerHTML = '<span class="empty-hint">Agent hazır. Bir görev verin.</span>';
      document.getElementById("agent-section").style.display = "none";
      const setup = document.getElementById("setup-section");
      setup.style.display = "flex";
      const btn = document.getElementById("baslatBtn");
      btn.disabled = false;
      btn.textContent = "Agenti Başlat";
    }
  </script>
</body>
</html>
